<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Meta Analysis - Krish Desai</title>

  <link rel="stylesheet" href="../style.css">
  <link rel="icon" href="images/photo-1753402836666-af43aa285dcb.avif">

  <script type="module" src="../global.js"></script>
  <script type="module" src="./main.js"></script>
</head>
<body>

  <h1>Meta Analysis</h1>

  <div id="stats" class="stats-grid"></div>

  <h2>Commits by Time of Day</h2>

  <div id="chart"></div>

  <p id="selection-count">No commits selected</p>

  <dl id="language-breakdown" class="stats"></dl>

  <dl id="commit-tooltip" class="info tooltip" hidden>
    <dt>Commit</dt>
    <dd><a id="commit-link" target="_blank"></a></dd>

    <dt>Date</dt>
    <dd id="commit-date"></dd>

    <dt>Author</dt>
    <dd id="commit-author"></dd>

    <dt>Lines Edited</dt>
    <dd id="commit-lines"></dd>
  </dl>

</body>
</html>
