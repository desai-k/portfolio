<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Contact</title>
  <link rel="stylesheet" href="https://desai-k.github.io/portfolio/style.css">

  <script type="module" src="global.js"></script>
</head>
<body>
  <h1>Contact</h1>

  <form action="mailto:ksdesai@ucsd.edu" method="POST" enctype="text/plain">

  <label>
    Your Email:
    <input type="email" name="email" required>
  </label>

  <br><br>

  <label>
    Subject:
    <input name="subject" required>
  </label>

  <br><br>

  <label>
    Message:
    <textarea name="body" rows="5" required></textarea>
  </label>

  <br><br>

  <button>Send</button>

</form>

</body>
</html>
